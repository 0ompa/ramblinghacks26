<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayOn Highlights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --header-bg: #111111;
      --card-bg: #161616;
      --card-border: #242424;
      --teal: #00e5c8;
      --teal-dim: rgba(0, 229, 200, 0.07);
      --white: #ffffff;
      --gray-text: #6a6a6a;
      --seek-track: #232323;
      --controls-bg: #0d0d0d;
    }

    body {
      background-color: var(--bg);
      background-image: repeating-linear-gradient(-45deg,
          transparent 0px,
          transparent 3px,
          rgba(255, 255, 255, 0.016) 3px,
          rgba(255, 255, 255, 0.016) 4px);
      color: var(--white);
      font-family: 'Barlow', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      background: var(--header-bg);
      border-left: 5px solid var(--teal);
      border-bottom: 1px solid #1a1a1a;
      padding: 0 28px;
      height: 52px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--white);
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      padding-right: 18px;
      border-right: 1px solid #2a2a2a;
    }

    header h1 span {
      color: var(--teal);
    }

    header p {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--gray-text);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .clip-selector-wrapper {
      padding: 10px 24px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #181818;
    }

    .clip-selector-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .clip-selector {
      flex: 1;
      min-width: 0;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--card-border) transparent;
    }

    .clip-selector::-webkit-scrollbar {
      height: 2px;
    }

    .clip-selector::-webkit-scrollbar-track {
      background: transparent;
    }

    .clip-selector::-webkit-scrollbar-thumb {
      background: var(--card-border);
      border-radius: 0;
    }

    .clip-card {
      flex-shrink: 0;
      background: var(--card-bg);
      border-top: 1px solid var(--card-border);
      border-right: 1px solid var(--card-border);
      border-bottom: 1px solid var(--card-border);
      border-left: 3px solid transparent;
      border-radius: 0;
      padding: 8px 14px 8px 13px;
      cursor: pointer;
      transition: border-left-color 0.12s, background 0.12s;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 140px;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }

    .clip-card:hover {
      border-left-color: rgba(0, 229, 200, 0.4);
      background: rgba(255, 255, 255, 0.025);
    }

    .clip-card.active {
      border-left-color: var(--teal);
      background: var(--teal-dim);
    }

    .clip-card-head {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .clip-card .clip-title {
      font-family: 'Oswald', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .clip-rename-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--gray-text);
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }

    .clip-rename-btn:hover {
      color: var(--teal);
      background: rgba(0, 229, 200, 0.08);
      border-color: rgba(0, 229, 200, 0.35);
    }

    .clip-rename-btn:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 1px;
    }

    .clip-title-input {
      flex: 1;
      min-width: 0;
      font-family: 'Oswald', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--white);
      background: #0d0d0d;
      border: 1px solid var(--teal);
      padding: 2px 6px;
      border-radius: 0;
    }

    .clip-title-input:focus {
      outline: none;
      box-shadow: 0 0 0 1px var(--teal);
    }

    .clip-card .clip-tag {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--teal);
    }

    .clip-add-form {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
    }

    .clip-add-btn {
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 16px 8px 14px;
      min-width: 88px;
      cursor: pointer;
      border: 1px dashed rgba(0, 229, 200, 0.45);
      border-left: 3px solid var(--teal);
      border-radius: 0;
      background: var(--card-bg);
      color: var(--teal);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
      align-self: stretch;
    }

    .clip-add-btn:hover:not(:disabled) {
      background: var(--teal-dim);
      border-style: solid;
      border-color: var(--teal);
      color: var(--white);
    }

    .clip-add-btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .comparison-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px 24px 0;
      gap: 12px;
      min-height: 0;
    }

    .players-row {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      min-height: 0;
    }

    .player-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .player-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-text);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .player-label::before {
      content: '';
      display: block;
      width: 3px;
      height: 11px;
      background: var(--teal);
      flex-shrink: 0;
    }

    .player-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      max-width: 100%;
    }

    .player-label-row .player-label {
      flex: 1;
      min-width: 0;
    }

    .export-youtube-btn {
      flex-shrink: 0;
      font-family: 'Oswald', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--teal);
      padding: 5px 10px;
      border: 1px solid rgba(0, 229, 200, 0.45);
      background: rgba(0, 229, 200, 0.06);
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .export-youtube-btn:hover {
      background: var(--teal-dim);
      color: var(--white);
      border-color: var(--teal);
    }

    .export-youtube-btn[aria-disabled="true"] {
      opacity: 0.35;
      pointer-events: none;
    }

    .video-wrapper {
      background: #000;
      border-radius: 0;
      overflow: hidden;
      border: 1px solid #1c1c1c;
      border-top: 2px solid var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrapper video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #landscape-wrapper {
      aspect-ratio: 16 / 9;
    }

    #portrait-wrapper {
      aspect-ratio: 9 / 16;
    }

    .controls {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 0 -24px;
      width: calc(100% + 48px);
      background: var(--controls-bg);
      border-top: 1px solid #1e1e1e;
      padding: 12px 24px 14px;
    }

    .seek-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .time-display {
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--gray-text);
      white-space: nowrap;
      min-width: 40px;
      letter-spacing: 0.02em;
    }

    .time-display.right {
      text-align: right;
    }

    #seek-bar {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 0;
      outline: none;
      cursor: pointer;
      transition: height 0.1s;
      background: linear-gradient(to right,
          var(--teal) 0%,
          var(--teal) var(--seek-pct, 0%),
          var(--seek-track) var(--seek-pct, 0%),
          var(--seek-track) 100%);
    }

    #seek-bar:hover {
      height: 5px;
    }

    #seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 11px;
      height: 11px;
      border-radius: 0;
      background: var(--teal);
      cursor: pointer;
      transition: transform 0.1s;
    }

    #seek-bar::-webkit-slider-thumb:hover {
      transform: scale(1.25);
    }

    #seek-bar::-moz-range-thumb {
      width: 11px;
      height: 11px;
      border-radius: 0;
      background: var(--teal);
      cursor: pointer;
      border: none;
    }

    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 0;
      border: none;
      background: var(--teal);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(45deg);
      transition: transform 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }

    .play-btn:hover {
      transform: rotate(45deg) scale(1.12);
      box-shadow: 0 0 18px rgba(0, 229, 200, 0.38);
    }

    .play-btn svg {
      width: 16px;
      height: 16px;
      fill: #000;
      transform: rotate(-45deg);
    }

    .no-clips-msg {
      padding: 24px 28px;
      color: var(--gray-text);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      border-bottom: 1px solid #181818;
    }

    .no-clips-msg code {
      font-family: 'Roboto Mono', monospace;
      font-size: 0.75rem;
      color: var(--teal);
    }

    .messages {
      padding: 8px 24px;
      font-size: 0.8rem;
      border-bottom: 1px solid #181818;
    }

    .messages .success {
      color: var(--teal);
    }

    .messages .error {
      color: #ff6b6b;
    }
  </style>
</head>

<body>

  <header>
    <h1>PlayOn <span>Highlights</span></h1>
    <p>From the Field to the Feed</p>
  </header>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="clip-selector-wrapper">
    <div class="clip-selector-row">
      <div class="clip-selector" id="clip-selector"></div>
      <form id="upload-highlight-form" class="clip-add-form" method="post" action="{% url 'upload_highlight' %}"
        enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="video" id="id_video" class="sr-only" accept=".mp4,video/mp4" tabindex="-1" />
        <button type="button" class="clip-add-btn" id="add-video-btn">
          + Add
        </button>
      </form>
    </div>
  </div>

  <div class="comparison-area" id="comparison-area">
    <div class="players-row" id="players-row">

      <div class="player-block">
        <div class="player-label">Original (16:9)</div>
        <div class="video-wrapper" id="landscape-wrapper">
          <video id="video-landscape" preload="metadata"></video>
        </div>
      </div>

      <div class="player-block">
        <div class="player-label-row">
          <div class="player-label">Portrait (9:16)</div>
          <a class="export-youtube-btn" id="export-youtube-btn" href="#"
            title="Download 1080×1920 H.264 (YouTube Shorts–friendly). Requires ffmpeg on the server.">
            Export
          </a>
        </div>
        <div class="video-wrapper" id="portrait-wrapper">
          <video id="video-portrait" preload="metadata"></video>
        </div>
      </div>

    </div>

    <div class="controls">
      <div class="seek-row">
        <span class="time-display" id="time-current">0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" step="0.01" value="0" />
        <span class="time-display right" id="time-duration">0:00</span>
      </div>
      <button class="play-btn" id="play-btn" aria-label="Play / Pause">
        <svg id="icon-play" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg id="icon-pause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <path d="M6 19h4V5H6zm8-14v14h4V5z" />
        </svg>
      </button>
    </div>
  </div>

  {{ clips|json_script:"clips-data" }}

  <script>
    const CLIPS = JSON.parse(document.getElementById('clips-data').textContent);

    const selectorEl = document.getElementById('clip-selector');
    const videoLand = document.getElementById('video-landscape');
    const videoPort = document.getElementById('video-portrait');
    const landWrapper = document.getElementById('landscape-wrapper');
    const portWrapper = document.getElementById('portrait-wrapper');
    const playersRow = document.getElementById('players-row');
    const seekBar = document.getElementById('seek-bar');
    const timeCurrent = document.getElementById('time-current');
    const timeDuration = document.getElementById('time-duration');
    const playBtn = document.getElementById('play-btn');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const comparisonArea = document.getElementById('comparison-area');
    const exportYoutubeBtn = document.getElementById('export-youtube-btn');

    const CLIP_TAB_TITLE_KEY = 'highlights_clip_tab_titles';
    let renameState = null;

    function readTitleMap() {
      try {
        const j = localStorage.getItem(CLIP_TAB_TITLE_KEY);
        return j ? JSON.parse(j) : {};
      } catch {
        return {};
      }
    }

    function writeTitleMap(m) {
      try {
        localStorage.setItem(CLIP_TAB_TITLE_KEY, JSON.stringify(m));
      } catch { /* quota / private mode */ }
    }

    function getDisplayTitle(clip) {
      const m = readTitleMap();
      const t = m[clip.id];
      return (typeof t === 'string' && t.trim()) ? t.trim() : clip.title;
    }

    function persistTabTitle(clipId, displayTitle, defaultTitle) {
      const m = readTitleMap();
      if (!displayTitle || displayTitle === defaultTitle) {
        delete m[clipId];
      } else {
        m[clipId] = displayTitle;
      }
      writeTitleMap(m);
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    const RENAME_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true" width="14" height="14"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.41l-2.34-2.34a1.003 1.003 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>';

    function buildCardHeadHtml(clip, displayTitle) {
      return `
        <div class="clip-card-head">
          <div class="clip-title"></div>
          <button type="button" class="clip-rename-btn" aria-label="Rename ${escapeAttr(displayTitle)}" title="Rename tab">${RENAME_SVG}</button>
        </div>
        <div class="clip-tag">${clip.play_type}</div>
      `;
    }

    function wireRenameOnCard(card, clip) {
      const titleEl = card.querySelector('.clip-title');
      const displayTitle = getDisplayTitle(clip);
      titleEl.textContent = displayTitle;

      const btn = card.querySelector('.clip-rename-btn');
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        startTabRename(card, clip);
      });
    }

    function startTabRename(card, clip) {
      if (renameState) {
        finishTabRename(renameState.saveOnFinish);
      }
      const head = card.querySelector('.clip-card-head');
      const titleEl = card.querySelector('.clip-title');
      const prevTitle = titleEl.textContent;
      head.innerHTML = `
        <input type="text" class="clip-title-input" value="${escapeAttr(prevTitle)}" maxlength="80" aria-label="Tab name" />
      `;
      const input = head.querySelector('.clip-title-input');
      input.focus();
      input.select();

      renameState = { card, clip, input, prevTitle, saveOnFinish: true };

      input.addEventListener('click', (e) => e.stopPropagation());
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          renameState.saveOnFinish = true;
          input.blur();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          renameState.saveOnFinish = false;
          input.blur();
        }
      });
      input.addEventListener('blur', () => {
        const st = renameState;
        if (!st || st.input !== input) return;
        const save = st.saveOnFinish !== false;
        finishTabRename(save);
      });
    }

    function finishTabRename(save) {
      const st = renameState;
      if (!st) return;
      const { card, clip, input, prevTitle } = st;
      renameState = null;

      const defaultTitle = clip.title;
      let display;
      if (save) {
        const raw = (input.value || '').trim();
        if (!raw || raw === defaultTitle) {
          display = defaultTitle;
          persistTabTitle(clip.id, display, defaultTitle);
        } else {
          display = raw;
          persistTabTitle(clip.id, display, defaultTitle);
        }
      } else {
        display = prevTitle;
      }

      card.innerHTML = buildCardHeadHtml(clip, display);
      wireRenameOnCard(card, clip);
    }

    let activeClipIdx = 0;
    let isSeeking = false;
    let syncGuard = false;

    function sizeVideos() {
      if (!CLIPS.length) return;
      const GAP = 24;
      const rowRect = playersRow.getBoundingClientRect();
      const totalW = rowRect.width - GAP;
      const totalH = rowRect.height - 40;

      const ratio = 16 / 9 + 9 / 16;
      const hFromW = totalW / ratio;
      const h = Math.min(hFromW, totalH);

      const landW = Math.round(h * 16 / 9);
      const portW = Math.round(h * 9 / 16);
      const hPx = Math.round(h);

      landWrapper.style.width = landW + 'px';
      landWrapper.style.height = hPx + 'px';
      portWrapper.style.width = portW + 'px';
      portWrapper.style.height = hPx + 'px';
    }

    window.addEventListener('resize', sizeVideos);
    requestAnimationFrame(() => requestAnimationFrame(sizeVideos));

    function buildSelector() {
      selectorEl.innerHTML = '';
      if (!CLIPS.length) {
        const wrap = document.createElement('div');
        wrap.className = 'no-clips-msg';
        wrap.innerHTML = 'No paired clips found. Use <strong>+ Add</strong> to upload an MP4, or place <code>clipN_landscape.mp4</code> plus <code>clipN_portrait.mp4</code> (or <code>.webm</code>) under <code>out/frontend/videos</code>.';
        selectorEl.appendChild(wrap);
        comparisonArea.style.display = 'none';
        if (exportYoutubeBtn) {
          exportYoutubeBtn.setAttribute('aria-disabled', 'true');
          exportYoutubeBtn.removeAttribute('href');
        }
        return;
      }
      comparisonArea.style.display = '';
      if (exportYoutubeBtn) exportYoutubeBtn.removeAttribute('aria-disabled');
      CLIPS.forEach((clip, i) => {
        const card = document.createElement('div');
        card.className = 'clip-card' + (i === activeClipIdx ? ' active' : '');
        card.innerHTML = buildCardHeadHtml(clip, getDisplayTitle(clip));
        wireRenameOnCard(card, clip);
        card.addEventListener('click', (e) => {
          if (e.target.closest('.clip-title-input')) return;
          loadClip(i);
        });
        selectorEl.appendChild(card);
      });
    }

    function loadClip(idx) {
      if (!CLIPS.length) return;
      if (idx === activeClipIdx && videoLand.src) return;
      activeClipIdx = idx;

      const clip = CLIPS[idx];

      if (exportYoutubeBtn) {
        exportYoutubeBtn.href = '/export/youtube/' + encodeURIComponent(clip.id) + '/';
        exportYoutubeBtn.removeAttribute('aria-disabled');
      }

      pause();

      videoLand.src = clip.original_video_url;
      videoPort.src = clip.portrait_video_url;
      videoLand.load();
      videoPort.load();

      seekBar.value = 0;
      seekBar.style.setProperty('--seek-pct', '0%');
      timeCurrent.textContent = '0:00';
      timeDuration.textContent = '0:00';

      document.querySelectorAll('.clip-card').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
      });

      videoLand.addEventListener('loadedmetadata', onMetadata, { once: true });
    }

    function onMetadata() {
      const dur = videoLand.duration || 0;
      seekBar.max = dur;
      timeDuration.textContent = formatTime(dur);
      sizeVideos();
    }

    videoLand.addEventListener('timeupdate', () => {
      if (isSeeking) return;
      const t = videoLand.currentTime;
      updateSeekUI(t);
      if (!syncGuard && Math.abs(videoPort.currentTime - t) > 0.1) {
        syncGuard = true;
        videoPort.currentTime = t;
        syncGuard = false;
      }
    });

    videoLand.addEventListener('ended', () => {
      pause();
    });

    function play() {
      videoLand.play().catch(() => { });
      videoPort.play().catch(() => { });
      iconPlay.style.display = 'none';
      iconPause.style.display = '';
    }

    function pause() {
      videoLand.pause();
      videoPort.pause();
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
    }

    playBtn.addEventListener('click', () => {
      if (!CLIPS.length) return;
      if (videoLand.paused) play(); else pause();
    });

    seekBar.addEventListener('mousedown', () => { isSeeking = true; });
    seekBar.addEventListener('touchstart', () => { isSeeking = true; }, { passive: true });

    seekBar.addEventListener('input', () => {
      const t = parseFloat(seekBar.value);
      updateSeekUI(t);
    });

    seekBar.addEventListener('change', () => {
      const t = parseFloat(seekBar.value);
      videoLand.currentTime = t;
      videoPort.currentTime = t;
      isSeeking = false;
    });

    document.addEventListener('mouseup', () => { isSeeking = false; });
    document.addEventListener('touchend', () => { isSeeking = false; });

    function updateSeekUI(t) {
      const dur = videoLand.duration || 0;
      seekBar.value = t;
      const pct = dur > 0 ? (t / dur) * 100 : 0;
      seekBar.style.setProperty('--seek-pct', pct.toFixed(2) + '%');
      timeCurrent.textContent = formatTime(t);
      if (dur > 0) timeDuration.textContent = formatTime(dur);
    }

    function formatTime(s) {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    const uploadForm = document.getElementById('upload-highlight-form');
    const uploadInput = document.getElementById('id_video');
    const addVideoBtn = document.getElementById('add-video-btn');
    if (uploadForm && uploadInput && addVideoBtn) {
      addVideoBtn.setAttribute('aria-label', 'Add highlight MP4');
      addVideoBtn.setAttribute('title', 'Upload an MP4 — runs the portrait pipeline and adds a new tab');
      addVideoBtn.addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', () => {
        if (uploadInput.files && uploadInput.files.length) {
          addVideoBtn.disabled = true;
          addVideoBtn.textContent = '…';
          uploadForm.submit();
        }
      });
    }

    buildSelector();
    if (CLIPS.length) loadClip(0);
  </script>
</body>

</html>
